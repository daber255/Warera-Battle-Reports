<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warera Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1><span>Warera</span> Reports</h1>
    <div class="header-actions">
      <div class="token-input-group">
        <input type="text" id="api-token" placeholder="API Token eingeben..." spellcheck="false">
        <span id="token-status" class="token-status">
          <span class="dot unset"></span> Kein Token
        </span>
      </div>
    </div>
  </header>

  <div class="container">

    <!-- Settings Bar -->
    <div class="settings-bar">
      <label>
        <span class="label-row">Modus</span>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="battle">Battle</button>
          <button class="mode-btn" data-mode="country">Land</button>
        </div>
      </label>

      <div id="view-battle" class="mode-view flex-wrap items-center gap-8" style="display:flex;flex:1;">
        <label style="flex:1;min-width:200px;">
          <span class="label-row">Battle ID</span>
          <input type="text" id="battle-id" placeholder="z.B. 6a166e21912e4f61ebb8d84a" style="width:100%;">
        </label>
        <button class="btn" id="battle-fetch-btn" style="margin-top:14px;">Abrufen</button>
      </div>

      <div id="view-country" class="mode-view flex-wrap items-center gap-8 hidden" style="flex:1;">
        <label style="flex:1;min-width:160px;">
          <span class="label-row">Land</span>
          <select id="country-select" style="width:100%;"></select>
        </label>
        <label>
          <span class="label-row">Von</span>
          <input type="date" id="country-date-from">
        </label>
        <label>
          <span class="label-row">Bis</span>
          <input type="date" id="country-date-to">
        </label>
        <div>
          <span class="label-row">&nbsp;</span>
          <div class="date-presets">
            <button class="date-preset" data-days="2">2d</button>
            <button class="date-preset active" data-days="5">5d</button>
            <button class="date-preset" data-days="7">7d</button>
            <button class="date-preset" data-days="14">14d</button>
            <button class="date-preset" data-days="30">30d</button>
          </div>
        </div>
        <button class="btn" id="country-fetch-btn" style="margin-top:14px;">Report erstellen</button>
      </div>
    </div>

    <!-- Error displays -->
    <div id="battle-err" class="error-box hidden"></div>
    <div id="country-err" class="error-box hidden"></div>

    <!-- Progress -->
    <div id="country-progress" class="card hidden">
      <div class="progress-bar"><div id="prog-fill" class="progress-fill" style="width:0%"></div></div>
      <div id="prog-text" class="progress-text">Initialisiere...</div>
    </div>

    <!-- Recent Top Battles (Battle Mode) -->
    <div id="recent-battles" class="card">
      <div class="card-header">Letzte 3 Tage — nach Schaden</div>
      <div id="recent-battles-list"><div class="loading"><div class="spinner"></div> Lade aktuelle Schlachten...</div></div>
    </div>

    <!-- Results -->
    <div id="battle-result"></div>
    <div id="country-result"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <p style="font-size:1.2rem;font-weight:600;">Willkommen bei Warera Reports</p>
      <p>Gib oben deinen API-Token ein und wähle einen Modus.</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
